<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperless LLM Search</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); padding: 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }

        h1 { margin-bottom: 40px; color: #1a1a1a; font-size: 32px; font-weight: 700; }

        .section { margin-bottom: 40px; }
        .section:first-child { padding-bottom: 40px; border-bottom: 2px solid #f0f0f0; }

        .filters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .filter-group { display: flex; flex-direction: column; }
        label { display: block; margin-bottom: 10px; color: #333; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

        select, input[type="text"], textarea {
            padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        select:focus, input[type="text"]:focus, textarea:focus {
            outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }
        .filters-grid select { height: 280px; }
        #sortOrder { height: auto !important; }

        @media (max-width: 768px) {
            .filters-grid { grid-template-columns: 1fr; gap: 20px; }
            .filters-grid select { height: 200px; }
        }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            .filters-grid { gap: 16px; }
            .filters-grid select { height: 150px; }
            button { padding: 12px 20px; font-size: 13px; }
            h1 { font-size: 24px; margin-bottom: 24px; }
        }
        input[type="checkbox"] { margin-right: 8px; cursor: pointer; }

        .checkbox-group { display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; }
        .checkbox-item { display: flex; align-items: center; }

        button {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%); color: white; padding: 14px 28px; border: none;
            border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3); }
        button:active { transform: translateY(0); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        button[onclick="searchDocuments()"] {
            width: 100%; padding: 18px 28px; font-size: 16px; font-weight: 700; margin-top: 8px;
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.2);
        }
        button[onclick="searchDocuments()"]:hover {
            box-shadow: 0 8px 20px rgba(0, 102, 204, 0.3);
        }

        #askBtn {
            margin-top: 8px;
        }

        .button-group { display: flex; gap: 10px; margin-top: 20px; }

        .status { padding: 14px 16px; margin: 15px 0; border-radius: 6px; display: none; font-size: 14px; }
        .status.loading { display: block; background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
        .status.success { display: block; background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .status.error { display: block; background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }

        .results {
            background: #f9fafb; padding: 20px; border-radius: 8px; margin: 20px 0;
            border: 1px solid #e5e7eb; display: none;
        }
        .results.show { display: block; }
        #docPreview { max-height: 400px; overflow-y: auto; padding: 8px; }
        .doc-preview { font-size: 14px; color: #333; margin: 8px 0; padding: 12px; background: white; border-left: 4px solid #0066cc; border-radius: 4px; display: flex; align-items: center; gap: 12px; transition: background 0.2s; }
        .doc-preview:hover { background: #f9fafb; }
        .doc-preview input[type="checkbox"] { flex-shrink: 0; width: 16px; height: 16px; cursor: pointer; margin: 0; }
        .doc-preview a { color: #0066cc; text-decoration: none; font-weight: 500; }
        .doc-preview a:hover { text-decoration: underline; }
        .doc-preview span { color: #999; font-size: 13px; }

        textarea { resize: vertical; min-height: 100px; }

        .answer { background: linear-gradient(135deg, #f0f8ff 0%, #f5faff 100%); padding: 24px; border-radius: 8px; margin: 20px 0; display: none; border-left: 4px solid #0066cc; }
        .answer p { margin: 12px 0; line-height: 1.8; color: #333; }
        .answer strong { color: #0052a3; font-weight: 600; }
        .answer em { color: #666; font-style: italic; }
        .answer ul, .answer ol { margin: 12px 0 12px 24px; }
        .answer li { margin: 8px 0; }
        .answer.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Paperless LLM Search</h1>

        <!-- Markdown renderer library -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

        <div id="filterStatus" class="status"></div>

        <!-- Search Stage -->
        <div class="section">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Document Type</label>
                    <select id="docType" multiple>
                        <option value="">Loading...</option>
                    </select>
                    <button type="button" onclick="clearSelect('docType')" style="margin-top: 8px; padding: 8px 12px; font-size: 12px; background: #f5f5f5; color: #666; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; font-weight: 500;">Clear</button>
                </div>

                <div class="filter-group">
                    <label>Correspondent</label>
                    <select id="correspondent" multiple>
                        <option value="">Loading...</option>
                    </select>
                    <button type="button" onclick="clearSelect('correspondent')" style="margin-top: 8px; padding: 8px 12px; font-size: 12px; background: #f5f5f5; color: #666; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; font-weight: 500;">Clear</button>
                </div>

                <div class="filter-group">
                    <label>Tags</label>
                    <select id="tags" multiple>
                        <option value="">Loading...</option>
                    </select>
                    <button type="button" onclick="clearSelect('tags')" style="margin-top: 8px; padding: 8px 12px; font-size: 12px; background: #f5f5f5; color: #666; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; font-weight: 500;">Clear</button>
                </div>

                <div class="filter-group">
                    <label>Text Search</label>
                    <input type="text" id="textSearch" placeholder="Keywords..." onkeypress="if(event.key==='Enter') searchDocuments()">
                    <button type="button" onclick="document.getElementById('textSearch').value=''" style="margin-top: 8px; padding: 8px 12px; font-size: 12px; background: #f5f5f5; color: #666; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; font-weight: 500;">Clear</button>
                </div>
            </div>

            <button onclick="searchDocuments()">Search Documents</button>

            <div id="results" class="results">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:16px;">
                    <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer;font-weight:600;">
                        <input type="checkbox" id="selectAll" checked onchange="toggleSelectAll(this.checked)" style="width:18px;height:18px;">
                        Found <span id="docCount">0</span> documents
                    </label>
                    <select id="sortOrder" onchange="renderDocList()" style="width:180px;padding:10px 12px;font-size:13px;border:2px solid #e0e0e0;border-radius:6px;background:white;cursor:pointer;">
                        <option value="date-desc">Date (newest)</option>
                        <option value="date-asc">Date (oldest)</option>
                        <option value="title-asc">Title (A–Z)</option>
                        <option value="title-desc">Title (Z–A)</option>
                    </select>
                </div>
                <div id="docPreview"></div>
            </div>
        </div>

        <!-- Question Stage -->
        <div class="section" id="questionSection" style="display: none;">
            <div class="filter-group" style="max-width: 600px;">
                <label>Ask a Question</label>
                <input type="text" id="question" placeholder="What would you like to know..." onkeypress="if(event.key==='Enter') askQuestion()">
            </div>

            <button id="askBtn" onclick="askQuestion()">Get Answer</button>
            <div id="answerStatus" class="status"></div>

            <div id="answer" class="answer">
                <p id="answerText"></p>
            </div>
        </div>
    </div>

    <script>
        let indexedDocs = null;
        let paperlessUrl = '';

        function clearSelect(elementId) {
            const select = document.getElementById(elementId);
            Array.from(select.options).forEach(option => option.selected = false);
        }

        // Cosine similarity function
        function cosineSimilarity(a, b) {
            const dot = a.reduce((sum, x, i) => sum + x * b[i], 0);
            const magA = Math.sqrt(a.reduce((sum, x) => sum + x * x, 0));
            const magB = Math.sqrt(b.reduce((sum, x) => sum + x * x, 0));
            if (magA === 0 || magB === 0) return 0;
            return dot / (magA * magB);
        }

        // Rank documents by relevance to query embedding
        function rankDocuments(docs, queryEmbedding, topK = 5) {
            const scored = docs.map(doc => ({
                doc,
                score: cosineSimilarity(queryEmbedding, doc.embedding)
            }));
            scored.sort((a, b) => b.score - a.score);
            return scored.slice(0, topK).map(s => s.doc);
        }

        // Load filter options on page load
        window.addEventListener('load', loadFilters);

        async function loadFilters() {
            try {
                const res = await fetch('/api/filters');
                const data = await res.json();

                paperlessUrl = data.paperless_url || '';
                populateSelect('docType', data.document_types);
                populateSelect('correspondent', data.correspondents);
                populateSelect('tags', data.tags);
            } catch (e) {
                showStatus('Error loading filters: ' + e.message, 'error');
            }
        }

        function populateSelect(elementId, options) {
            const select = document.getElementById(elementId);
            select.innerHTML = '<option value="">-- Select --</option>';
            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt.id || opt;
                option.textContent = opt.name || opt;
                select.appendChild(option);
            });
        }

        async function searchDocuments() {
            const docType = Array.from(document.getElementById('docType').selectedOptions).map(o => o.value);
            const correspondent = Array.from(document.getElementById('correspondent').selectedOptions).map(o => o.value);
            const tags = Array.from(document.getElementById('tags').selectedOptions).map(o => o.value);
            const textSearch = document.getElementById('textSearch').value;

            if (docType.length === 0 && correspondent.length === 0 && tags.length === 0 && !textSearch) {
                showStatus('Please select at least one filter', 'error');
                return;
            }

            showStatus('Searching Paperless...', 'loading');

            try {
                const res = await fetch('/api/search/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        document_type: docType.length > 0 ? docType : null,
                        correspondent: correspondent.length > 0 ? correspondent : null,
                        tags: tags.length > 0 ? tags : null,
                        search_text: textSearch || null
                    })
                });

                if (!res.ok) throw new Error('Search failed');

                const data = await res.json();
                indexedDocs = data.documents;

                document.getElementById('docCount').textContent = indexedDocs.length;
                document.getElementById('sortOrder').value = 'date-desc';
                renderDocList();

                document.getElementById('results').classList.add('show');
                document.getElementById('questionSection').style.display = 'block';
                showStatus(`Found ${indexedDocs.length} documents`, 'success');
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }

        async function askQuestion() {
            if (!indexedDocs) {
                showAnswerStatus('Please search documents first', 'error');
                return;
            }

            const question = document.getElementById('question').value;
            if (!question) {
                showAnswerStatus('Please enter a question', 'error');
                return;
            }

            const checkedIds = new Set(
                [...document.querySelectorAll('.doc-checkbox:checked')].map(cb => parseInt(cb.dataset.id))
            );
            const selectedDocs = indexedDocs.filter(doc => checkedIds.has(doc.id));
            if (selectedDocs.length === 0) {
                showAnswerStatus('Please select at least one document', 'error');
                return;
            }

            const btn = document.getElementById('askBtn');
            btn.disabled = true;
            showAnswerStatus('Ranking documents...', 'loading');

            try {
                const res = await fetch('/api/search/answer-stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        documents: selectedDocs
                    })
                });

                if (!res.ok) throw new Error('Failed to get answer');

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let finalResult = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const msg = JSON.parse(line.slice(6));
                                if (msg.type === 'progress') {
                                    if (msg.message.includes('Analyzing')) {
                                        showAnswerStatus(msg.message, 'loading');
                                    } else {
                                        showAnswerStatus('Thinking...', 'loading');
                                    }
                                } else if (msg.type === 'result') {
                                    finalResult = msg.data;
                                } else if (msg.type === 'error') {
                                    showAnswerStatus('Error: ' + msg.message, 'error');
                                }
                            } catch (e) {
                                // Skip invalid JSON
                            }
                        }
                    }
                }

                if (finalResult && finalResult.summary) {
                    document.getElementById('answerText').innerHTML = marked.parse(finalResult.summary);
                    document.getElementById('answer').classList.add('show');
                    showAnswerStatus('Answer ready', 'success');
                } else {
                    showAnswerStatus('No answer received', 'error');
                }
            } catch (e) {
                showAnswerStatus('Error: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function renderDocList() {
            const sort = document.getElementById('sortOrder').value;
            const sorted = [...indexedDocs].sort((a, b) => {
                if (sort === 'title-asc') return a.title.localeCompare(b.title);
                if (sort === 'title-desc') return b.title.localeCompare(a.title);
                const da = a.created_date || '';
                const db = b.created_date || '';
                return sort === 'date-asc' ? da.localeCompare(db) : db.localeCompare(da);
            });
            const preview = document.getElementById('docPreview');
            preview.innerHTML = sorted.map(doc =>
                `<div class="doc-preview"><input type="checkbox" class="doc-checkbox" data-id="${doc.id}" checked onchange="syncSelectAll()"><a href="${paperlessUrl}/documents/${doc.id}/details" target="_blank"><strong>${doc.title}</strong>${doc.created_date ? ` <span style="color:#999;font-weight:normal;">(${doc.created_date.slice(0,10)})</span>` : ''}</a></div>`
            ).join('');
            document.getElementById('selectAll').checked = true;
            document.getElementById('selectAll').indeterminate = false;
        }

        function toggleSelectAll(checked) {
            document.querySelectorAll('.doc-checkbox').forEach(cb => cb.checked = checked);
        }

        function syncSelectAll() {
            const all = document.querySelectorAll('.doc-checkbox');
            const checked = document.querySelectorAll('.doc-checkbox:checked');
            const master = document.getElementById('selectAll');
            master.indeterminate = checked.length > 0 && checked.length < all.length;
            master.checked = checked.length === all.length;
        }

        function showAnswerStatus(msg, type) {
            const el = document.getElementById('answerStatus');
            el.textContent = msg;
            el.className = 'status ' + type;
            if (type === 'success') setTimeout(() => el.className = 'status', 3000);
        }

        function showStatus(msg, type) {
            const el = document.getElementById('filterStatus');
            el.textContent = msg;
            el.className = 'status ' + type;
            if (type === 'success') setTimeout(() => el.className = 'status', 3000);
        }
    </script>
</body>
</html>
